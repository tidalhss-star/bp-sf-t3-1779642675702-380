<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0a0a"/>
      <stop offset="100%" stop-color="#1a1a2e"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#1a1a2e"/>
    </linearGradient>
  </defs>

  <!-- 배경 -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Geometric pattern -->
  <circle cx="1244" cy="180" r="33" fill="#1a1a2e" opacity="0.06"/>
    <circle cx="249" cy="708" r="58" fill="#1a1a2e" opacity="0.09"/>
    <circle cx="527" cy="-81" r="39" fill="#1a1a2e" opacity="0.17"/>
    <circle cx="84" cy="515" r="95" fill="#1a1a2e" opacity="0.15"/>
    <circle cx="349" cy="237" r="57" fill="#1a1a2e" opacity="0.11"/>
    <circle cx="940" cy="91" r="39" fill="#1a1a2e" opacity="0.12"/>
    <rect x="892" y="689" width="92" height="82" rx="8" fill="#0a0a0a" opacity="0.05" transform="rotate(39, 448, 46)"/>
    <rect x="176" y="27" width="68" height="30" rx="8" fill="#0a0a0a" opacity="0.09" transform="rotate(22, 445, -44)"/>
    <rect x="70" y="423" width="29" height="68" rx="8" fill="#0a0a0a" opacity="0.13" transform="rotate(37, -20, 166)"/>
    <rect x="1" y="172" width="65" height="31" rx="8" fill="#0a0a0a" opacity="0.07" transform="rotate(23, 359, 73)"/>
    <rect x="511" y="269" width="40" height="59" rx="8" fill="#0a0a0a" opacity="0.05" transform="rotate(4, 737, 349)"/>
    <rect x="1192" y="-11" width="81" height="92" rx="8" fill="#0a0a0a" opacity="0.14" transform="rotate(32, 502, 128)"/>
    <rect x="162" y="348" width="67" height="93" rx="8" fill="#0a0a0a" opacity="0.05" transform="rotate(5, 720, -7)"/>
    <rect x="435" y="402" width="57" height="55" rx="8" fill="#0a0a0a" opacity="0.10" transform="rotate(20, 936, 593)"/>
    <polygon points="236,276 260,324 212,324" fill="#1a1a2e" opacity="0.05"/>
    <polygon points="1195,103 1236,185 1154,185" fill="#1a1a2e" opacity="0.04"/>
    <polygon points="240,308 317,462 163,462" fill="#1a1a2e" opacity="0.05"/>
    <polygon points="1281,468 1369,644 1193,644" fill="#1a1a2e" opacity="0.05"/>

  <!-- Wave at bottom -->
  <path d="M0,590 C360,610 840,570 1200,590 L1200,630 L0,630Z" fill="#1a1a2e" opacity="0.3"/>

  <!-- 중앙 텍스트 카드 -->
  <rect x="80" y="195" width="1040" height="260" rx="20" fill="rgba(0,0,0,0.35)" filter="url(#blur-bg)"/>
  <filter id="blur-bg"><feGaussianBlur stdDeviation="8"/></filter>

  <text x="600" y="270" text-anchor="middle" font-family="'Noto Sans JP','Noto Sans KR','Pretendard',sans-serif" font-size="44" font-weight="700" fill="#ffffff" letter-spacing="2">
    화곡 셔츠룸
  </text>
  <text x="600" y="330" text-anchor="middle" font-family="'Noto Sans JP','Noto Sans KR','Pretendard',sans-serif" font-size="22" font-weight="400" fill="rgba(255,255,255,0.85)">
    마포 — 성우이벤트
  </text>

  <!-- Accent line -->
  <line x1="450" y1="355" x2="750" y2="355" stroke="#7c3aed" stroke-width="3" stroke-linecap="round" opacity="0.8"/>

  <!-- 하단 CTA -->
  <rect x="440" y="385" width="320" height="40" rx="20" fill="#7c3aed" opacity="0.9"/>
  <text x="600" y="411" text-anchor="middle" font-family="'Noto Sans JP','Noto Sans KR','Pretendard',sans-serif" font-size="16" font-weight="600" fill="#ffffff">
    ▼ 자세히 보기
  </text>

  <!-- 상단 브랜드 -->
  <text x="60" y="55" font-family="'Noto Sans JP','Noto Sans KR','Pretendard',sans-serif" font-size="18" font-weight="600" fill="rgba(255,255,255,0.6)">
    마포 화곡 셔츠룸 — 성우이벤트
  </text>
</svg>